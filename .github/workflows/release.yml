name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # Автоматическое кэширование зависимостей

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
        shell: pwsh

      - name: 🔍 Extract version from version.txt
        id: get_version
        run: |
          $content = Get-Content version.txt | Where-Object { $_ -match "FileVersion" }
          if ($content -match '([0-9]+\.[0-9]+\.[0-9]+)') {
            $version = $matches[1]
            echo "version=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "❌ Не удалось извлечь версию из version.txt"
            exit 1
          }
        shell: pwsh

      - name: 📜 Extract changelog from changeLog.txt
        id: changelog_file
        run: |
          if (Test-Path changeLog.txt) {
            $lines = Get-Content changeLog.txt -Encoding utf8
            $desc = ""
            foreach ($line in $lines) {
              if ($line -match '^---+$') { break }
              $desc += "$line`n"
            }
            $desc = $desc.TrimEnd("`n")
          } else {
            $desc = "Release v$($steps.get_version.outputs.version)"
          }
          $eof = [System.Guid]::NewGuid().ToString()
          echo "changelog<<$eof" >> $env:GITHUB_OUTPUT
          echo "$desc" >> $env:GITHUB_OUTPUT
          echo "$eof" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: 🏗️ Build Blind_log.exe with PyInstaller
        run: |
          python -m PyInstaller Blind_log.spec
          if (!(Test-Path "dist\Blind_log.exe")) {
            Write-Error "❌ Файл не найден: dist\Blind_log.exe"
            exit 1
          }
        shell: pwsh

      - name: 📦 Archive build artifacts
        run: |
          Compress-Archive -Path dist\Blind_log.exe -DestinationPath dist\Blind_log.zip -Force
        shell: pwsh

      - name: 🚀 Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Blind Log v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog_file.outputs.changelog }}
          files: dist/Blind_log.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}